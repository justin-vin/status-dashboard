<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justin — Status</title>
  <meta name="description" content="Live status dashboard for Justin, an autonomous AI agent.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --text: #f0f0f0;
      --text-secondary: #777;
      --border: #222;
      --accent: #c8ff00;
      --accent-dim: #c8ff0018;
      --green: #22C55E;
      --yellow: #EAB308;
      --red: #EF4444;
      --grey: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Split Layout ─────────────────────────────── */
    .split {
      display: flex;
      height: 100vh;
      height: 100dvh;
    }

    .panel-avatar {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      position: relative;
      overflow: hidden;
    }

    .panel-status {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem;
      overflow-y: auto;
    }

    /* ── Avatar ───────────────────────────────────── */
    .avatar-bounce {
      display: inline-block;
      cursor: pointer;
    }

    .avatar-wrapper {
      width: min(70vw, 70vh, 480px);
      height: min(70vw, 70vh, 480px);
      border-radius: 16px;
      overflow: hidden;
      background: transparent;
      transition: box-shadow 0.3s ease;
    }

    .avatar-wrapper:hover {
      box-shadow: 0 0 60px rgba(200, 255, 0, 0.08);
    }

    .avatar-wrapper svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Status Content ───────────────────────────── */
    .status-content {
      max-width: 420px;
    }

    .name {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 0.875rem;
      margin-top: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      margin-top: 1rem;
      padding: 0.3rem 0.85rem;
      border-radius: 9999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-active .status-dot { background: var(--accent); }
    .status-active { background: var(--accent-dim); color: var(--accent); }
    .status-idle .status-dot { background: var(--yellow); }
    .status-idle { background: #EAB30818; color: var(--yellow); }
    .status-sleeping .status-dot { background: var(--grey); animation: none; }
    .status-sleeping { background: #66666618; color: var(--grey); }
    .status-dead .status-dot { background: var(--red); animation: none; }
    .status-dead { background: #EF444418; color: var(--red); }
    .status-working .status-dot { background: var(--accent); }
    .status-working { background: var(--accent-dim); color: var(--accent); }
    .status-error .status-dot { background: var(--red); }
    .status-error { background: #EF444418; color: var(--red); }

    /* ── Active Sessions ──────────────────────────── */
    .active-now {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .active-now-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .active-now-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .active-now-count {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin-left: auto;
    }

    /* ── Stats Grid ───────────────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Ticket Bar ───────────────────────────────── */
    .ticket-section {
      margin-top: 0.75rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
    }

    .card-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
      font-family: 'JetBrains Mono', monospace;
    }

    .ticket-bar-visual {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--border);
    }

    .ticket-bar-visual .segment {
      transition: width 0.5s ease;
    }

    .ticket-bar-visual .done { background: var(--accent); }
    .ticket-bar-visual .doing { background: var(--green); }
    .ticket-bar-visual .todo { background: var(--yellow); }

    .ticket-legend {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .ticket-legend span {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .legend-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      display: inline-block;
    }

    /* ── Done Chart ───────────────────────────────── */
    .done-section {
      margin-top: 0.75rem;
    }

    .done-chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .done-chart-header .card-label {
      margin-bottom: 0;
    }

    .done-total {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }

    .done-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 48px;
    }

    .done-bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .done-bar {
      width: 100%;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
      min-height: 2px;
      transition: height 0.5s ease;
      opacity: 0.7;
    }

    .done-bar:hover { opacity: 1; }

    .done-bar-label {
      font-size: 0.55rem;
      color: var(--text-secondary);
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
    }

    .done-bar-count {
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Activity ─────────────────────────────────── */
    .activity-section {
      margin-top: 0.75rem;
    }

    .activity-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.375rem 0;
      font-size: 0.8rem;
    }

    .activity-item + .activity-item {
      border-top: 1px solid var(--border);
    }

    .activity-item-label {
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
    }

    .activity-item-value {
      font-weight: 600;
    }

    /* ── Footer ───────────────────────────────────── */
    .footer {
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }

    /* ── Debug Panel ──────────────────────────────── */
    .debug-panel {
      margin-top: 1.5rem;
    }

    .debug-panel select {
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
    }

    /* ── Mobile: Horizontal Split (top/bottom) ──── */
    @media (max-width: 768px) {
      .split {
        flex-direction: column;
      }

      .panel-avatar {
        flex: 1;
        min-height: 0;
      }

      .avatar-wrapper {
        width: min(60vw, 45vh, 320px);
        height: min(60vw, 45vh, 320px);
        border-radius: 12px;
      }

      .panel-status {
        flex: 1;
        padding: 1.5rem;
        justify-content: flex-start;
        overflow-y: auto;
      }

      .name {
        font-size: 1.75rem;
      }

      .stats-grid {
        gap: 0.5rem;
      }

      .stat-value {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 400px) {
      .panel-status {
        padding: 1rem;
      }

      .avatar-wrapper {
        width: min(55vw, 40vh, 260px);
        height: min(55vw, 40vh, 260px);
      }

      .name {
        font-size: 1.5rem;
      }

      .stat-value {
        font-size: 1.25rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .status-dot { animation: none; }
      .ticket-bar-visual .segment { transition: none; }
    }
  </style>
</head>
<body>
  <div class="split">
    <!-- Left / Top: Avatar -->
    <div class="panel-avatar">
      <div class="avatar-bounce" id="avatar-bounce">
        <div class="avatar-wrapper">
          <svg id="avatar"></svg>
        </div>
      </div>
    </div>

    <!-- Right / Bottom: Status -->
    <div class="panel-status">
      <div class="status-content">
        <div class="name">Justin</div>
        <div class="tagline">autonomous ai agent · chief of staff</div>
        <div class="status-badge status-active" id="status-badge">
          <div class="status-dot"></div>
          <span id="status-text">Online</span>
        </div>

        <div class="active-now" id="active-now-card" style="display:none">
          <div class="active-now-dot"></div>
          <span class="active-now-label">active sessions</span>
          <span class="active-now-count" id="active-now-count">0</span>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="days-alive">—</div>
            <div class="stat-label">Days Alive</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="uptime">—</div>
            <div class="stat-label">Uptime</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="tickets-done">—</div>
            <div class="stat-label">Tickets Done</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="total-commits">—</div>
            <div class="stat-label">Commits</div>
          </div>
        </div>

        <div class="ticket-section">
          <div class="card">
            <div class="card-label">Board</div>
            <div class="ticket-bar-visual" id="ticket-bar">
              <div class="segment todo" style="width: 0%"></div>
              <div class="segment doing" style="width: 0%"></div>
            </div>
            <div class="ticket-legend">
              <span><span class="legend-dot" style="background: var(--yellow)"></span> To Do <b id="todo-count">0</b></span>
              <span><span class="legend-dot" style="background: var(--green)"></span> Doing <b id="doing-count">0</b></span>
            </div>
          </div>
        </div>

        <div class="done-section">
          <div class="card">
            <div class="done-chart-header">
              <div class="card-label">Tickets Done</div>
              <div class="done-total" id="done-total">0 all time</div>
            </div>
            <div class="done-chart" id="done-chart"></div>
          </div>
        </div>

        <div class="activity-section">
          <div class="card">
            <div class="card-label">Activity</div>
            <div class="activity-item">
              <span class="activity-item-label">last seen</span>
              <span class="activity-item-value" id="last-seen">—</span>
            </div>
            <div class="activity-item">
              <span class="activity-item-label">born</span>
              <span class="activity-item-value" id="born-date">March 24, 2026</span>
            </div>
            <div class="activity-item">
              <span class="activity-item-label">today's commits</span>
              <span class="activity-item-value" id="today-commits">—</span>
            </div>
          </div>
        </div>

        <div class="footer">
          <a href="https://justin.vin">justin.vin</a>
        </div>

        <!-- Debug panel (shown with ?debug in URL) -->
        <div class="debug-panel" id="debug-panel" style="display:none">
          <div class="card-label">Status Override</div>
          <select id="status-select">
            <option value="active">Active</option>
            <option value="idle">Idle</option>
            <option value="working">Working</option>
            <option value="sleeping">Sleeping</option>
            <option value="deep_sleep">Deep Sleep</option>
            <option value="dead">Dead</option>
            <option value="error">Error</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <script src="/src/avatar.js"></script>
  <script>
    // ── Initialize Avatar ─────────────────────────────
    const svgEl = document.getElementById('avatar');
    const avatar = new AvatarAnimator(svgEl, { status: 'active' });

    // ── Status Display ─────────────────────────────────
    const STATUS_LABELS = {
      active: 'Online',
      idle: 'Idle',
      sleeping: 'Sleeping',
      deep_sleep: 'Deep Sleep',
      dead: 'Offline',
      working: 'Working',
      error: 'Error',
    };

    function updateStatusBadge(status) {
      const badge = document.getElementById('status-badge');
      const text = document.getElementById('status-text');
      badge.className = `status-badge status-${status.replace('_', '-')}`;
      if (status === 'deep_sleep') badge.className = 'status-badge status-sleeping';
      text.textContent = STATUS_LABELS[status] || status;
    }

    // ── Data Rendering ─────────────────────────────────
    function renderData(data) {
      const status = data.status || 'active';
      avatar.setStatus(status);
      updateStatusBadge(status);

      const activeSessions = data.activeSessions || 0;
      const activeCard = document.getElementById('active-now-card');
      if (activeSessions > 0) {
        activeCard.style.display = 'flex';
        document.getElementById('active-now-count').textContent = activeSessions;
      } else {
        activeCard.style.display = 'none';
      }

      document.getElementById('days-alive').textContent = data.daysAlive ?? '—';
      document.getElementById('uptime').textContent = data.uptime?.percentage
        ? `${data.uptime.percentage}%` : '—';
      document.getElementById('tickets-done').textContent = data.tickets?.done ?? '—';
      document.getElementById('total-commits').textContent = data.commits?.total ?? '—';

      const tickets = data.tickets || {};
      const activeTotal = (tickets.doing || 0) + (tickets.todo || 0);
      if (activeTotal > 0) {
        const bar = document.getElementById('ticket-bar');
        const segments = bar.querySelectorAll('.segment');
        segments[0].style.width = `${(tickets.todo / activeTotal) * 100}%`;
        segments[1].style.width = `${(tickets.doing / activeTotal) * 100}%`;
      }
      document.getElementById('doing-count').textContent = tickets.doing || 0;
      document.getElementById('todo-count').textContent = tickets.todo || 0;

      const doneDaily = data.doneDaily || {};
      const doneTotal = Object.values(doneDaily).reduce((a, b) => a + b, 0) || tickets.done || 0;
      document.getElementById('done-total').textContent = `${doneTotal} all time`;

      const chartEl = document.getElementById('done-chart');
      const days = Object.keys(doneDaily).sort();
      if (days.length > 0) {
        const maxDone = Math.max(...Object.values(doneDaily), 1);
        chartEl.innerHTML = days.map(day => {
          const count = doneDaily[day];
          const height = Math.max(2, (count / maxDone) * 40);
          const label = new Date(day + 'T12:00:00Z').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          return `<div class="done-bar-group">
            <div class="done-bar-count">${count}</div>
            <div class="done-bar" style="height: ${height}px" title="${label}: ${count} done"></div>
            <div class="done-bar-label">${label}</div>
          </div>`;
        }).join('');
      }

      if (data.lastSeen) {
        const ago = timeAgo(new Date(data.lastSeen));
        document.getElementById('last-seen').textContent = ago;
      }
      document.getElementById('today-commits').textContent = data.commits?.today ?? '—';
    }

    function timeAgo(date) {
      const now = new Date();
      const diff = now - date;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      const days = Math.floor(hours / 24);
      return `${days}d ago`;
    }

    function deriveStatus(lastSeen) {
      if (!lastSeen) return 'active';
      const diff = Date.now() - new Date(lastSeen).getTime();
      const mins = diff / 60000;
      if (mins < 10) return 'active';
      if (mins < 30) return 'idle';
      if (mins < 120) return 'sleeping';
      if (mins < 1440) return 'deep_sleep';
      return 'dead';
    }

    // ── Fetch Data ─────────────────────────────────────
    async function fetchStatus() {
      try {
        let resp;
        try {
          resp = await fetch('https://hooks.justin.vin/plugins/status-api/status');
          if (!resp.ok) throw new Error('Live endpoint failed');
        } catch (e) {
          resp = await fetch('/status.json?_=' + Date.now());
        }
        if (!resp.ok) throw new Error('Failed to fetch');
        const data = await resp.json();
        if (!data.status) {
          data.status = deriveStatus(data.lastSeen);
        }
        renderData(data);
      } catch (e) {
        renderData({
          status: 'dead',
          daysAlive: Math.ceil((Date.now() - new Date('2026-03-24').getTime()) / 86400000),
          lastSeen: null,
          uptime: { percentage: 0 },
          tickets: { todo: 0, doing: 0, done: 0 },
          commits: { today: 0, total: 0 },
          activeSessions: 0,
        });
      }
    }

    // ── Debug Panel ────────────────────────────────────
    if (window.location.search.includes('debug')) {
      document.getElementById('debug-panel').style.display = 'block';
      document.getElementById('status-select').addEventListener('change', (e) => {
        avatar.setStatus(e.target.value);
        updateStatusBadge(e.target.value);
      });
    }

    // ── Init ───────────────────────────────────────────
    fetchStatus();
    setInterval(fetchStatus, 10000);
  </script>
</body>
</html>
